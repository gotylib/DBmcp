name: Docker

on:
  push:
    branches: [ "prom" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Read release version
      id: version
      run: |
        set -a
        source version.env
        set +a
        echo "value=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Tag current latest as release version
      env:
        IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/dbmcp
        VERSION: ${{ steps.version.outputs.value }}
      run: |
        if docker pull "$IMAGE:latest"; then
          docker tag "$IMAGE:latest" "$IMAGE:v$VERSION"
          docker push "$IMAGE:v$VERSION"
        else
          echo "No existing latest image — skipping version tag."
        fi

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/dbmcp:latest
